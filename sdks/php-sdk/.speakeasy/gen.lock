examples:
  delete_/endpoint-groups/{id}:
    speakeasy-default-delete-/endpoint-groups/{id}:
      parameters:
        path:
          id: "grp_a1b2_efgh5678"
  patch_/endpoint-groups/{id}:
    speakeasy-default-patch-/endpoint-groups/{id}:
      parameters:
        path:
          id: "grp_a1b2_efgh5678"
  get_/endpoint-groups: {}
  post_/endpoint-groups:
    speakeasy-default-post-/endpoint-groups:
      requestBody:
        application/json: {"name": "My Endpoint Group", "description": "My Endpoint Group description", "endpointIds": ["ep_a1b2_efgh5678"], "enabled": true}
  delete_/endpoints/{id}:
    speakeasy-default-delete-/endpoints/{id}:
      parameters:
        path:
          id: "ep_a1b2_abcd1234"
  patch_/endpoints/{id}:
    speakeasy-default-patch-/endpoints/{id}:
      parameters:
        path:
          id: "ep_a1b2_abcd1234"
  get_/endpoints: {}
  post_/endpoints:
    speakeasy-default-post-/endpoints:
      requestBody:
        application/json: {"name": "My Webhook Endpoint", "description": "My Webhook Endpoint description", "url": "https://example.com/webhook", "enabled": true, "retryPolicy": "exponential", "maxAttempts": 3, "timeoutMs": 30000, "customHeaders": {}, "proxyGroupId": "proxygrp_a1b2_efgh5678"}
  delete_/event-types/{id}:
    speakeasy-default-delete-/event-types/{id}:
      parameters:
        path:
          id: "user.created"
  patch_/event-types/{id}:
    speakeasy-default-patch-/event-types/{id}:
      parameters:
        path:
          id: "user.created"
      requestBody:
        application/json: {"name": "User Created", "description": "User created event", "schema": {}, "enabled": true}
  get_/event-types: {}
  post_/event-types:
    speakeasy-default-post-/event-types:
      requestBody:
        application/json: {"name": "User Created", "description": "User created event", "schema": {}, "enabled": true}
  post_/webhooks/send:
    speakeasy-default-post-/webhooks/send:
      parameters:
        header:
          Idempotency-Key: "1234567890"
      requestBody:
        application/json: {"endpoints": ["ep_a1b2_abcd1234", "grp_a1b2_efgh5678"], "eventType": "user.created", "payload": {}, "eventId": "abcdef1234567890"}
