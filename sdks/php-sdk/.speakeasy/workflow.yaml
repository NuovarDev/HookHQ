workflowVersion: 1.0.0
speakeasyVersion: latest
sources:
    Workers Webhooks API:
        inputs:
            - location: ../../src/lib/openapi.json
        output: .speakeasy/out.openapi.yaml
        registry:
            location: registry.speakeasyapi.dev/nuovar/hookhq/workers-webhooks-api
targets:
    hookhq:
        target: php
        source: Workers Webhooks API
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/nuovar/hookhq/workers-webhooks-api-php-code-samples
            labelOverride:
                fixedValue: Php (SDK)
            blocking: false
