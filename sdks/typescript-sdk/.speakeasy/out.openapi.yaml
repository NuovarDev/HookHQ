openapi: "3.0.0"
info:
  title: "Workers Webhooks API"
  version: "1.0"
servers:
  - url: "/api"
components:
  securitySchemes:
    "bearerAuth":
      type: "http"
      scheme: "bearer"
      bearerFormat: "Bearer token authentication"
    "apiKeyCookie":
      type: "apiKey"
      in: "cookie"
      name: "apiKeyCookie"
      description: "API Key authentication via cookie"
security:
  - bearerAuth: []
  - apiKeyCookie: []
tags:
  - name: "Webhooks"
    description: "Webhooks API"
  - name: "Endpoints"
    description: "Endpoints API"
  - name: "Endpoint Groups"
    description: "Endpoint Groups API"
  - name: "Event Types"
    description: "Event Types API"
x-speakeasy-retries: {"strategy": "backoff", "statusCodes": ["5XX"], "retryConnectionErrors": true}
paths:
  "/endpoint-groups/{id}":
    delete:
      description: "Delete an endpoint group"
      tags:
        - "Endpoint Groups"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "Endpoint group ID"
          schema:
            type: "string"
          example: "grp_a1b2_efgh5678"
      responses:
        "200":
          description: "Endpoint group deleted"
      x-speakeasy-group: "endpointGroups"
      x-speakeasy-name-override: "delete"
    patch:
      description: "Update an endpoint group"
      tags:
        - "Endpoint Groups"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "Endpoint group ID"
          schema:
            type: "string"
          example: "grp_a1b2_efgh5678"
      responses:
        "200":
          description: "Endpoint group updated"
      x-speakeasy-group: "endpointGroups"
      x-speakeasy-name-override: "update"
  "/endpoint-groups":
    get:
      description: "List endpoint groups for the current environment"
      tags:
        - "Endpoint Groups"
      responses:
        "200":
          description: "List of endpoint groups"
      x-speakeasy-group: "endpointGroups"
      x-speakeasy-name-override: "list"
    post:
      description: "Create new endpoint group"
      tags:
        - "Endpoint Groups"
      requestBody:
        content:
          "application/json":
            schema:
              type: "object"
              required:
                - "name"
              properties:
                "name":
                  type: "string"
                  description: "Name of the endpoint group"
                  example: "My Endpoint Group"
                "description":
                  type: "string"
                  description: "Description of the endpoint group"
                  example: "My Endpoint Group description"
                "endpointIds":
                  type: "array"
                  items:
                    type: "string"
                  description: "List of endpoint IDs"
                  example: ["ep_a1b2_efgh5678"]
                "enabled":
                  type: "boolean"
                  description: "Whether the endpoint group is enabled"
                  example: true
      responses:
        "200":
          description: "Endpoint group created"
      x-speakeasy-group: "endpointGroups"
      x-speakeasy-name-override: "create"
  "/endpoints/{id}":
    delete:
      description: "Delete an endpoint"
      tags:
        - "Endpoints"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "Endpoint ID"
          schema:
            type: "string"
          example: "ep_a1b2_abcd1234"
      responses:
        "200":
          description: "Endpoint deleted"
      x-speakeasy-name-override: "delete"
    patch:
      description: "Update an endpoint"
      tags:
        - "Endpoints"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "Endpoint ID"
          schema:
            type: "string"
          example: "ep_a1b2_abcd1234"
      responses:
        "200":
          description: "Endpoint updated"
      x-speakeasy-name-override: "update"
  "/endpoints":
    get:
      description: "List endpoints for the current environment"
      tags:
        - "Endpoints"
      parameters:
        - name: "enabled"
          in: "query"
          description: "Whether to filter endpoints by enabled status"
          required: false
          schema:
            type: "boolean"
      responses:
        "200":
          description: "List of endpoints"
      x-speakeasy-name-override: "list"
    post:
      description: "Create new endpoint"
      tags:
        - "Endpoints"
      requestBody:
        content:
          "application/json":
            schema:
              type: "object"
              required:
                - "name"
                - "url"
              properties:
                "name":
                  type: "string"
                  description: "Name of the endpoint"
                  example: "My Webhook Endpoint"
                "description":
                  type: "string"
                  description: "Description of the endpoint"
                  example: "My Webhook Endpoint description"
                "url":
                  type: "string"
                  description: "URL of the endpoint"
                  example: "https://example.com/webhook"
                "enabled":
                  type: "boolean"
                  description: "Whether the endpoint is enabled"
                  default: true
                "retryPolicy":
                  type: "string"
                  description: "Retry policy of the endpoint"
                  default: "exponential"
                  enum:
                    - "exponential"
                    - "linear"
                    - "fixed"
                "maxAttempts":
                  type: "number"
                  description: "Maximum number of attempts of the endpoint"
                  default: 3
                "timeoutMs":
                  type: "number"
                  description: "Timeout of the endpoint"
                  default: 30000
                "customHeaders":
                  type: "object"
                  description: "Custom headers of the endpoint"
                  example: {"Content-Type": "application/json"}
                "proxyGroupId":
                  type: "string"
                  description: "Proxy group ID of the endpoint"
                  example: "proxygrp_a1b2_efgh5678"
      responses:
        "200":
          description: "Endpoint created"
      x-speakeasy-name-override: "create"
  "/event-types/{id}":
    delete:
      description: "Delete an event type"
      tags:
        - "Event Types"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "Event type ID"
          schema:
            type: "string"
          example: "user.created"
      responses:
        "200":
          description: "Event type deleted"
      x-speakeasy-group: "eventTypes"
      x-speakeasy-name-override: "delete"
    patch:
      description: "Update an event type"
      tags:
        - "Event Types"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "Event type ID"
          schema:
            type: "string"
          example: "user.created"
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: "object"
              properties:
                "name":
                  description: "Event type name"
                  type: "string"
                  example: "User Created"
                "description":
                  description: "Event type description"
                  type: "string"
                  example: "User created event"
                "schema":
                  description: "Event type schema"
                  type: "object"
                  example: {"type": "object", "properties": {"userId": {"type": "string"}}}
                "enabled":
                  description: "Event type enabled status"
                  type: "boolean"
                  example: true
      responses:
        "200":
          description: "Event type updated"
      x-speakeasy-group: "eventTypes"
      x-speakeasy-name-override: "update"
  "/event-types":
    get:
      description: "List event types for the current environment"
      tags:
        - "Event Types"
      responses:
        "200":
          description: "List of event types"
      x-speakeasy-group: "eventTypes"
      x-speakeasy-name-override: "list"
    post:
      description: "Create new event type"
      tags:
        - "Event Types"
      requestBody:
        content:
          "application/json":
            schema:
              type: "object"
              required:
                - "name"
              properties:
                "name":
                  type: "string"
                  description: "Name of the event type"
                  example: "User Created"
                "description":
                  type: "string"
                  description: "Description of the event type"
                  example: "User created event"
                "schema":
                  type: "object"
                  description: "JSON Schema for event payload validation (must be valid JSON Schema)"
                  example: "{\n  \"type\": \"object\",\n  \"properties\": {\n    \"userId\": {\n      \"type\": \"string\"\n    }\n  },\n  \"required\": [\"userId\"]\n}\n"
                "enabled":
                  type: "boolean"
                  description: "Whether the event type is enabled"
                  example: true
      responses:
        "200":
          description: "Event type created"
        "400":
          description: "Bad request (invalid schema or missing required fields)"
      x-speakeasy-group: "eventTypes"
      x-speakeasy-name-override: "create"
  "/api/portal/token":
    post:
      x-speakeasy-group: "portal"
      x-speakeasy-name-override: "create"
      description: "Generate a JWT token for end user portal access"
      tags:
        - "Portal"
      requestBody:
        content:
          "application/json":
            schema:
              type: "object"
              required:
                - "endpointGroupId"
              properties:
                "endpointGroupId":
                  type: "string"
                  description: "ID of the endpoint group to manage"
                  example: "grp_a1b2_efgh5678"
                "allowedEventTypes":
                  type: "array"
                  items:
                    type: "string"
                  description: "List of event types the user can subscribe to"
                  example: ["user.created", "user.updated"]
                "applicationName":
                  type: "string"
                  description: "Name of the application for the back button"
                  example: "My Application"
                "returnUrl":
                  type: "string"
                  description: "URL to return to when user clicks back button"
                  example: "https://myapp.com/settings"
      responses:
        "200":
          description: "JWT token generated successfully"
          content:
            "application/json":
              schema:
                type: "object"
                example: {"token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...", "portalUrl": "http://localhost:3000/portal?token=...", "expiresIn": 86400, "endpointGroup": {"id": "grp_a1b2_efgh5678", "name": "My Endpoint Group", "environmentId": "a12b"}}
                properties:
                  "token":
                    type: "string"
                    description: "JWT token for portal access"
                  "portalUrl":
                    type: "string"
                    description: "URL to the portal with token"
                  "expiresIn":
                    type: "number"
                    description: "Token expiration time in seconds"
                  "endpointGroup":
                    type: "object"
                    description: "Endpoint group information"
                    properties:
                      "id":
                        type: "string"
                        description: "Endpoint group ID"
                      "name":
                        type: "string"
                        description: "Endpoint group name"
                      "environmentId":
                        type: "string"
                        description: "Environment ID"
        "400":
          description: "Bad request"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "endpointGroupId is required"}
        "401":
          description: "Unauthorized"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Unauthorized"}
        "403":
          description: "Forbidden"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Forbidden"}
        "404":
          description: "Endpoint group not found"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Endpoint group not found"}
        "429":
          description: "Rate limit exceeded"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Rate limit exceeded"}
        "500":
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Internal server error"}
          description: "Internal server error"
  "/webhooks/send":
    post:
      description: "Send a webhook to the specified endpoints.\n\n Webhooks can be sent to endpoints and/or endpoint groups. \n In order to send a webhook to an endpoint group, the eventType must be specified, then the webhook will be dispatched to all endpoints in the group that are subscribed to the eventType.\n"
      tags:
        - "Webhooks"
      requestBody:
        content:
          "application/json":
            schema:
              type: "object"
              required:
                - "payload"
                - "endpoints"
              properties:
                "endpoints":
                  description: "List of endpoints or endpoint groups to send the webhook to"
                  type: "array"
                  items:
                    type: "string"
                  example: ["ep_a1b2_abcd1234", "grp_a1b2_efgh5678"]
                "eventType":
                  description: "Event type to send the webhook to. Required if sending to an endpoint group."
                  type: "string"
                  example: "user.created"
                "payload":
                  description: "Payload to send with the webhook"
                  type: "object"
                  example: {"userId": "abcd1234"}
                "eventId":
                  description: "Optional unique event ID to track the webhook"
                  type: "string"
                  example: "abcdef1234567890"
      parameters:
        - name: "Idempotency-Key"
          in: "header"
          required: false
          description: "Optional idempotency key"
          schema:
            type: "string"
          example: 1234567890
      responses:
        "200":
          description: "Webhook sent"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "id":
                    type: "string"
                    description: "Webhook ID"
                  "eventId":
                    type: "string"
                    description: "Event ID"
                  "eventType":
                    type: "string"
                    description: "Event type"
                  "payload":
                    type: "object"
                    description: "Payload"
                  "channels":
                    type: "array"
                    description: "Channels the webhook was sent to"
                    items:
                      type: "string"
                      description: "Channel ID"
                  "timestamp":
                    type: "string"
                    description: "Timestamp the webhook was sent"
                example: {"id": "abcdef1234567890", "eventId": "abcdef1234567890", "eventType": "user.created", "payload": {"userId": "abcd1234"}, "channels": ["ep_a1b2_abcd1234", "grp_a1b2_efgh5678"], "timestamp": "2021-01-01T00:00:00.000Z"}
        "400":
          description: "Bad request (invalid payload, missing required fields, or payload validation failed)"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Bad request"}
        "401":
          description: "Unauthorized"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Unauthorized"}
        "403":
          description: "Forbidden"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Forbidden"}
        "429":
          description: "Rate limit exceeded"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Rate limit exceeded"}
        "500":
          description: "Internal server error"
          content:
            "application/json":
              schema:
                type: "object"
                properties:
                  "error":
                    type: "string"
                    description: "Error message"
                example: {"error": "Internal server error"}
      x-speakeasy-name-override: "send"
