      parameters:
        header:
          Idempotency-Key: "1234567890"
      requestBody:
        application/json: {"endpoints": ["ep_a1b2_abcd1234", "grp_a1b2_efgh5678"], "eventType": "user.created", "payload": {}, "eventId": "abcdef1234567890"}
