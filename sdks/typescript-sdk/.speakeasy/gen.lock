        "500":
          application/json: {"error": "Internal server error"}
  post_/api/portal/token:
    speakeasy-default-post-/api/portal/token:
      requestBody:
        application/json: {"endpointGroupId": "grp_a1b2_efgh5678", "allowedEventTypes": ["user.created", "user.updated"], "applicationName": "My Application", "returnUrl": "https://myapp.com/settings"}
