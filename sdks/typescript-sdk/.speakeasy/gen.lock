    speakeasy-default-post-/endpoints:
      requestBody:
        application/json: {"name": "My Webhook Endpoint", "description": "My Webhook Endpoint description", "url": "https://example.com/webhook", "enabled": true, "retryPolicy": "exponential", "maxAttempts": 3, "timeoutMs": 30000, "customHeaders": {}, "proxyGroupId": "proxygrp_a1b2_efgh5678"}
