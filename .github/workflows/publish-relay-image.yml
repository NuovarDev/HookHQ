name: Publish Relay Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "relay-v*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute version tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == relay-v* ]]; then
            echo "value=${GITHUB_REF_NAME#relay-v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            nuovar/hookhq-relay
            ghcr.io/${{ github.repository_owner }}/hookhq-relay
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=raw,value=${{ steps.version.outputs.value }},enable=${{ steps.version.outputs.value != '' }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./relay
          file: ./relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  npm:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Compute version tag
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#relay-v}" >> "$GITHUB_OUTPUT"

      - name: Verify package version matches git tag
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./relay/package.json').version")
          TAG_VERSION="${{ steps.version.outputs.value }}"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "Package version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish relay package to npm
        working-directory: ./relay
        run: npm publish
